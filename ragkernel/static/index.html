<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ragkernel · 企业知识库</title>
<style>
  :root {
    --bg: #f7f8fa; --panel: #ffffff; --fg: #1c2128; --dim: #6e7681; --line: #e2e5e9;
    --accent: #2f6feb; --accent-soft: #e8f0fe; --green: #1a7f37; --red: #cf222e; --amber: #9a6700;
    --chip: #eef1f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --panel: #161b22; --fg: #c9d1d9; --dim: #8b949e; --line: #30363d;
      --accent: #58a6ff; --accent-soft: #12233f; --green: #3fb950; --red: #f85149; --amber: #d29922;
      --chip: #21262d;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.6 -apple-system, "SF Pro Text", "PingFang SC", "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--panel);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  header b { font-size: 15px; }
  header .sub { color: var(--dim); font-size: 12px; }
  header .spacer { flex: 1; }
  .btn {
    background: var(--chip); color: var(--fg); border: 1px solid var(--line); border-radius: 7px;
    padding: 6px 12px; cursor: pointer; font: inherit; font-size: 13px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  #main { flex: 1; display: flex; min-height: 0; }

  #docs { width: 300px; border-right: 1px solid var(--line); background: var(--panel); display: flex; flex-direction: column; flex-shrink: 0; }
  #docs .hd { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  #docs .hd span { font-weight: 600; }
  #drop { margin: 12px 16px; padding: 18px; border: 1.5px dashed var(--line); border-radius: 10px; text-align: center; color: var(--dim); cursor: pointer; transition: .15s; font-size: 13px; }
  #drop:hover, #drop.over { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  #doclist { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
  .doc { padding: 9px 10px; border-radius: 8px; display: flex; gap: 8px; align-items: flex-start; }
  .doc:hover { background: var(--bg); }
  .doc.hl { background: var(--accent-soft); }
  .doc .body { flex: 1; min-width: 0; }
  .doc .name { font-weight: 500; word-break: break-all; }
  .doc .meta { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .doc .kind { font-size: 11px; padding: 0 5px; border-radius: 4px; background: var(--chip); margin-left: 4px; }
  .doc .st-embedded { color: var(--green); }
  .doc .st-chunked, .doc .st-pending { color: var(--amber); }
  .doc .st-failed { color: var(--red); }
  .doc .del { color: var(--dim); cursor: pointer; padding: 0 4px; border-radius: 4px; visibility: hidden; }
  .doc:hover .del { visibility: visible; }
  .doc .del:hover { color: var(--red); background: var(--bg); }
  #upprog { padding: 4px 16px; color: var(--dim); font-size: 12px; white-space: pre-wrap; }

  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #log { flex: 1; overflow-y: auto; padding: 22px 26px; }
  .turn { max-width: 820px; margin: 0 auto 22px; }
  .q { font-weight: 600; margin-bottom: 8px; }
  .q::before { content: "❯ "; color: var(--accent); }
  .a { white-space: pre-wrap; word-break: break-word; }
  .trace { color: var(--dim); font-size: 12px; margin: 4px 0; font-family: "SF Mono", Menlo, monospace; }
  .cites { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .cite { font: 12px "SF Mono", Menlo, monospace; background: var(--chip); color: var(--fg); padding: 3px 8px; border-radius: 6px; cursor: pointer; border: 1px solid var(--line); }
  .cite:hover { border-color: var(--accent); color: var(--accent); }
  .fb-open { margin-top: 8px; color: var(--accent); font-size: 13px; cursor: pointer; display: inline-block; }
  .fb { margin-top: 8px; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: var(--panel); max-width: 560px; }
  .fb input, .fb textarea { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; color: var(--fg); font: inherit; margin-bottom: 8px; }
  .fb textarea { resize: vertical; min-height: 52px; }
  .fb .row { display: flex; gap: 8px; }
  .fb .actions { display: flex; gap: 8px; align-items: center; }
  .fb .done { color: var(--green); font-size: 13px; }
  .thinking { color: var(--dim); }
  .err { color: var(--red); }
  .hint { color: var(--dim); max-width: 820px; margin: 0 auto; }
  #bar { border-top: 1px solid var(--line); background: var(--panel); padding: 12px 26px; }
  #bar form { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; }
  #in { flex: 1; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; color: var(--fg); font: inherit; outline: none; }
  #in:focus { border-color: var(--accent); }
  #send { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0 18px; cursor: pointer; font: inherit; font-weight: 600; }
  body.busy #in, body.busy #send { opacity: .6; pointer-events: none; }

  /* 仪表盘 */
  #dash { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; z-index: 50; }
  #dash.show { display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 40px 16px; }
  #dashbox { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; width: 100%; max-width: 860px; padding: 24px; }
  #dashbox h2 { font-size: 17px; margin-bottom: 4px; }
  #dashbox .close { float: right; cursor: pointer; color: var(--dim); font-size: 20px; line-height: 1; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px; margin: 16px 0; }
  .card { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
  .card .v { font-size: 24px; font-weight: 700; }
  .card .k { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .sec { margin-top: 18px; }
  .sec h3 { font-size: 13px; color: var(--dim); margin-bottom: 8px; font-weight: 600; }
  .barrow { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
  .barrow .lbl { width: 88px; flex-shrink: 0; color: var(--dim); }
  .barrow .track { flex: 1; background: var(--chip); border-radius: 4px; height: 16px; overflow: hidden; }
  .barrow .fill { height: 100%; background: var(--accent); border-radius: 4px; }
  .barrow .n { width: 44px; text-align: right; }
  .days { display: flex; align-items: flex-end; gap: 3px; height: 70px; }
  .days .d { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; }
  .hist { font-size: 12.5px; }
  .hist .h { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--line); color: var(--dim); }
  .hist .h b { color: var(--fg); font-weight: 500; }
  @media (max-width: 720px) { #docs { display: none; } }
</style>
</head>
<body>
<header>
  <b>ragkernel</b><span class="sub">企业知识库 · 本地检索 · 带引用问答</span>
  <span class="spacer"></span>
  <button class="btn" id="dashbtn">📊 仪表盘</button>
</header>
<div id="main">
  <aside id="docs">
    <div class="hd"><span>文档</span><span class="sub" id="doccount"></span></div>
    <div id="drop">拖拽文件到此，或点击选择<br><span class="sub">PDF · DOCX · MD · TXT · CSV/Excel 工单，自动索引</span></div>
    <input type="file" id="file" hidden>
    <div id="upprog"></div>
    <div id="doclist"></div>
  </aside>
  <section id="chat">
    <div id="log"></div>
    <div id="bar">
      <form id="form" action="javascript:void 0">
        <input id="in" autocomplete="off" autofocus placeholder="向知识库提问……答案会附条款级引用" spellcheck="false">
        <button id="send" type="submit">提问</button>
      </form>
    </div>
  </section>
</div>

<div id="dash"><div id="dashbox">
  <span class="close" id="dashclose">✕</span>
  <h2>知识库仪表盘</h2>
  <div class="sub" style="color:var(--dim);font-size:12px">文件 / 片段 / 索引 / 提问 —— 均有记录</div>
  <div id="dashbody"></div>
</div></div>

<script>
const $ = s => document.querySelector(s);
const log = $('#log'), input = $('#in'), drop = $('#drop'), fileInput = $('#file');
let session = null, busy = false;
const esc = s => (s || '').toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const KIND = { upload: '上传', ticket_import: '工单导入', feedback: '反馈案例' };

function scrollDown() { log.scrollTop = log.scrollHeight; }

async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader(), dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf('\n\n')) >= 0) {
      const line = buf.slice(0, i); buf = buf.slice(i + 2);
      if (line.startsWith('data: ')) onEvent(JSON.parse(line.slice(6)));
    }
  }
}

function fp() {
  const b = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height].join('|');
  let h = 5381; for (let i = 0; i < b.length; i++) h = ((h << 5) + h + b.charCodeAt(i)) >>> 0;
  return h.toString(16).padStart(8, '0');
}

async function boot() {
  const r = await fetch('/api/session', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fingerprint: fp() }) });
  session = await r.json();
  await loadDocs();
  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.innerHTML = '上传手册/工单后即可提问。答案只依据文档内容并附 <code>[D&lt;文档&gt;#&lt;块&gt; p.&lt;页&gt; · 分类]</code> 引用；查不到会如实说明。答完可「记录处理结果」回填知识库。';
  log.appendChild(hint);
}

async function loadDocs() {
  const r = await fetch('/api/documents');
  const j = await r.json();
  const list = $('#doclist'); list.innerHTML = '';
  $('#doccount').textContent = j.documents.length ? j.documents.length + ' 篇' : '';
  for (const d of j.documents) {
    const el = document.createElement('div');
    el.className = 'doc'; el.dataset.id = d.id;
    const kind = d.source_kind && d.source_kind !== 'upload' ? `<span class="kind">${KIND[d.source_kind] || d.source_kind}</span>` : '';
    el.innerHTML = `<div class="body">
        <div class="name">D${d.id} · ${esc(d.filename)}${kind}</div>
        <div class="meta">${d.chunks} 片${d.page_count ? ' · ' + d.page_count + ' 页' : ''} · <span class="st-${d.status}">${d.status}</span></div>
      </div><div class="del" title="删除">✕</div>`;
    el.querySelector('.del').onclick = () => deleteDoc(d.id);
    list.appendChild(el);
  }
}

async function deleteDoc(id) { await fetch('/api/documents/' + id, { method: 'DELETE' }); loadDocs(); }

function highlightDoc(id) {
  document.querySelectorAll('.doc').forEach(e => e.classList.toggle('hl', e.dataset.id == id));
  const el = document.querySelector(`.doc[data-id="${id}"]`);
  if (el) el.scrollIntoView({ block: 'nearest' });
}

async function uploadFile(file) {
  const prog = $('#upprog');
  const fd = new FormData(); fd.append('file', file);
  prog.textContent = '上传中 ' + file.name + ' …';
  try {
    const r = await fetch('/api/upload', { method: 'POST', body: fd });
    if (!r.ok) { const j = await r.json().catch(() => ({})); prog.textContent = '✗ ' + (j.error || r.status); return; }
    await readSSE(r, ev => {
      if (ev.t === 'stage') {
        const label = { received: '已接收', loading: '解析中', chunking: '分片中', embedding: '向量化（模型预热可能稍慢）', chunked: '分片完成', done: '✓ 已索引', skip: '已索引过（跳过）' }[ev.stage] || ev.stage;
        prog.textContent = label + (ev.chunks ? ' · ' + ev.chunks + ' 片' : '');
        if (ev.stage === 'done' || ev.stage === 'skip') { loadDocs(); setTimeout(() => prog.textContent = '', 2500); }
      } else if (ev.t === 'error') { prog.textContent = '✗ ' + ev.message; }
    });
  } catch (e) { prog.textContent = '✗ ' + e; }
}

drop.onclick = () => fileInput.click();
fileInput.onchange = () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); fileInput.value = ''; };
['dragover', 'dragenter'].forEach(t => drop.addEventListener(t, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave', 'drop'].forEach(t => drop.addEventListener(t, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) uploadFile(f); });

function addFeedback(turn, question) {
  const open = document.createElement('span');
  open.className = 'fb-open'; open.textContent = '✍ 记录处理结果';
  turn.appendChild(open);
  open.onclick = () => {
    open.remove();
    const fb = document.createElement('div'); fb.className = 'fb';
    fb.innerHTML = `
      <div class="row"><input class="eq" placeholder="设备/型号（选填）"><input class="rs" placeholder="结果（选填）"></div>
      <input class="qq" placeholder="故障现象/问题" value="${esc(question)}">
      <textarea class="rz" placeholder="实际处理/解决办法（必填）"></textarea>
      <div class="actions"><button class="btn sub">入库</button><span class="msg"></span></div>`;
    turn.appendChild(fb);
    fb.querySelector('.rz').focus();
    fb.querySelector('.sub').onclick = async () => {
      const resolution = fb.querySelector('.rz').value.trim();
      const msg = fb.querySelector('.msg');
      if (!resolution) { msg.className = 'msg err'; msg.textContent = '请填写实际处理'; return; }
      msg.textContent = '入库中…';
      const r = await fetch('/api/feedback', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: fb.querySelector('.qq').value, resolution, equipment: fb.querySelector('.eq').value, result: fb.querySelector('.rs').value }) });
      const j = await r.json();
      if (r.ok) { fb.innerHTML = `<span class="done">✓ 已入库为 D${j.document_id}「${esc(j.category)}」，下次同类问题会用上。</span>`; loadDocs(); }
      else { msg.className = 'msg err'; msg.textContent = '✗ ' + (j.error || r.status); }
    };
  };
}

async function ask(q) {
  busy = true; document.body.classList.add('busy');
  const turn = document.createElement('div'); turn.className = 'turn';
  turn.innerHTML = `<div class="q">${esc(q)}</div><div class="thinking">思考中…</div>`;
  log.appendChild(turn); scrollDown();
  const thinking = turn.querySelector('.thinking');
  try {
    const r = await fetch('/api/ask', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: session.session_id, question: q }) });
    if (!r.ok) { const j = await r.json().catch(() => ({})); thinking.className = 'err'; thinking.textContent = '✗ ' + (j.error || r.status); return; }
    await readSSE(r, ev => {
      if (ev.t === 'tool') {
        const arg = ev.input && (ev.input.query || ev.input.document_id || ev.input.category || '');
        const t = document.createElement('div'); t.className = 'trace';
        t.textContent = `↳ ${ev.name}${arg ? ' ' + JSON.stringify(arg) : ''}`;
        turn.insertBefore(t, thinking);
      } else if (ev.t === 'answer') {
        thinking.remove();
        const a = document.createElement('div'); a.className = 'a'; a.textContent = ev.text; turn.appendChild(a);
      } else if (ev.t === 'done') {
        if (ev.citations && ev.citations.length) {
          const box = document.createElement('div'); box.className = 'cites';
          for (const c of ev.citations) {
            const chip = document.createElement('span'); chip.className = 'cite';
            chip.textContent = `[${c.ref}${c.page ? ' p.' + c.page : ''}${c.category ? ' · ' + c.category : ''}] ${c.filename}`;
            chip.onclick = () => highlightDoc(c.document_id);
            box.appendChild(chip);
          }
          turn.appendChild(box);
        }
        addFeedback(turn, q);
      } else if (ev.t === 'error') { thinking.className = 'err'; thinking.textContent = '✗ ' + ev.message; }
      scrollDown();
    });
  } catch (e) { thinking.className = 'err'; thinking.textContent = '✗ ' + e; }
  finally { busy = false; document.body.classList.remove('busy'); input.focus(); }
}

$('#form').addEventListener('submit', e => {
  e.preventDefault();
  if (busy) return;
  const v = input.value.trim(); if (!v) return;
  input.value = ''; ask(v);
});

// 仪表盘
function bars(items, labelKey, nKey) {
  const max = Math.max(1, ...items.map(x => x[nKey]));
  return items.map(x => `<div class="barrow"><span class="lbl">${esc(x[labelKey])}</span>
    <span class="track"><span class="fill" style="width:${Math.round(x[nKey] / max * 100)}%"></span></span>
    <span class="n">${x[nKey]}</span></div>`).join('');
}
function renderDash(j) {
  const t = j.totals, q = j.queries;
  const cards = [['文档', t.documents], ['片段', t.chunks_total], ['已索引', t.embedded],
    ['字符数', t.chars_total], ['提问数', q.total], ['会话数', q.sessions]];
  const bySrc = Object.entries(t.by_source_kind || {}).map(([k, n]) => ({ k: KIND[k] || k, n }));
  const days = q.by_day || [];
  const dmax = Math.max(1, ...days.map(d => d.n));
  $('#dashbody').innerHTML = `
    <div class="cards">${cards.map(c => `<div class="card"><div class="v">${c[1]}</div><div class="k">${c[0]}</div></div>`).join('')}</div>
    ${bySrc.length ? `<div class="sec"><h3>来源构成（含反馈回填）</h3>${bars(bySrc, 'k', 'n')}</div>` : ''}
    ${j.categories.length ? `<div class="sec"><h3>分类分布</h3>${bars(j.categories, 'category', 'n')}</div>` : ''}
    <div class="sec"><h3>近 14 天提问量</h3><div class="days">${days.map(d => `<div class="d" style="height:${Math.round(d.n / dmax * 100)}%" title="${d.d}: ${d.n}"></div>`).join('') || '<span class="sub" style="color:var(--dim)">暂无</span>'}</div></div>
    <div class="sec"><h3>摄取历史</h3><div class="hist">${(j.ingestion || []).slice(0, 20).map(h =>
      `<div class="h"><b>${esc(h.filename)}</b><span>${h.action}</span><span>${h.chunks || 0}片</span><span>${h.ms || 0}ms</span><span>${new Date(h.ts * 1000).toLocaleString()}</span></div>`).join('') || '<span style="color:var(--dim)">暂无</span>'}</div></div>`;
}
async function openDash() {
  const r = await fetch('/api/stats'); const j = await r.json();
  renderDash(j); $('#dash').classList.add('show');
}
$('#dashbtn').onclick = openDash;
$('#dashclose').onclick = () => $('#dash').classList.remove('show');
$('#dash').onclick = e => { if (e.target.id === 'dash') $('#dash').classList.remove('show'); };

boot();
</script>
</body>
</html>

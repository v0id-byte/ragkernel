<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ragkernel · 企业知识库</title>
<style>
  /* Apple 中性灰系统 —— 无强彩色，单一石墨主色，发丝分隔线 */
  :root {
    --bg: #f5f5f7; --surface: #ffffff; --surface-2: #fbfbfd;
    --fg: #1d1d1f; --fg-2: #6e6e73; --fg-3: #86868b;
    --line: #d2d2d7; --line-soft: #e8e8ed; --fill: #f0f0f2;
    --btn: #1d1d1f; --btn-fg: #ffffff;
    --accent: #1d1d1f; --focus: #0071e3; --danger: #b3261e;
    --radius: 14px; --radius-lg: 20px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000; --surface: #1c1c1e; --surface-2: #161618;
      --fg: #f5f5f7; --fg-2: #a1a1a6; --fg-3: #8a8a8e;
      --line: #38383a; --line-soft: #2a2a2c; --fill: #2c2c2e;
      --btn: #f5f5f7; --btn-fg: #1d1d1f;
      --accent: #f5f5f7; --focus: #0a84ff; --danger: #ff453a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 15px/1.6 system-ui, -apple-system, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    display: flex; flex-direction: column; height: 100vh;
  }
  svg.ic { width: 20px; height: 20px; display: block; }
  button, .btn, label.tap { -webkit-tap-highlight-color: transparent; }

  header {
    padding: 14px 22px; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    background: color-mix(in srgb, var(--surface) 72%, transparent);
    backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--line-soft);
  }
  header .brand { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  header .sub { color: var(--fg-3); font-size: 12.5px; letter-spacing: 0; }
  header .spacer { flex: 1; }
  .ghost {
    display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 14px;
    background: var(--fill); color: var(--fg); border: none; border-radius: 999px;
    font: inherit; font-size: 13.5px; font-weight: 500; cursor: pointer;
    transition: transform 120ms cubic-bezier(.2,.7,.3,1), background 160ms ease;
  }
  .ghost:hover { background: color-mix(in srgb, var(--fill) 70%, var(--fg-3)); }
  .ghost:active { transform: scale(.96); }

  #main { flex: 1; display: flex; min-height: 0; }

  /* 侧栏：文档 */
  #docs { width: 300px; flex-shrink: 0; background: var(--surface-2); border-right: 0.5px solid var(--line-soft); display: flex; flex-direction: column; }
  #docs .hd { padding: 16px 18px 10px; display: flex; align-items: baseline; justify-content: space-between; }
  #docs .hd span { font-weight: 600; letter-spacing: -0.01em; }
  #docs .hd .sub { color: var(--fg-3); font-size: 12.5px; font-weight: 400; }
  #drop {
    margin: 4px 14px 12px; padding: 22px 14px; border: 1px dashed var(--line); border-radius: var(--radius);
    text-align: center; color: var(--fg-3); cursor: pointer; font-size: 13px; line-height: 1.5;
    transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
  }
  #drop:hover, #drop.over { border-color: var(--fg-3); color: var(--fg-2); background: var(--fill); }
  #doclist { flex: 1; overflow-y: auto; padding: 0 10px 14px; }
  .doc { padding: 10px 12px; border-radius: 12px; display: flex; gap: 10px; align-items: flex-start; transition: background 140ms ease; }
  .doc:hover { background: var(--fill); }
  .doc.hl { background: color-mix(in srgb, var(--focus) 12%, transparent); }
  .doc .body { flex: 1; min-width: 0; }
  .doc .name { font-weight: 500; word-break: break-all; letter-spacing: -0.01em; }
  .doc .meta { color: var(--fg-3); font-size: 12.5px; margin-top: 2px; }
  .doc .kind { font-size: 11px; padding: 1px 7px; border-radius: 999px; background: var(--fill); border: 0.5px solid var(--line); margin-left: 6px; color: var(--fg-2); }
  .doc .st-embedded { color: var(--fg-2); }
  .doc .st-chunked, .doc .st-pending { color: var(--fg-3); }
  .doc .del { color: var(--fg-3); cursor: pointer; padding: 3px; border-radius: 8px; opacity: 0; transition: opacity 140ms ease, color 140ms ease, background 140ms ease; }
  .doc:hover .del { opacity: 1; }
  .doc .del:hover { color: var(--danger); background: var(--surface); }
  #upprog { padding: 2px 18px 8px; color: var(--fg-3); font-size: 12.5px; white-space: pre-wrap; }

  /* 对话 */
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #log { flex: 1; overflow-y: auto; padding: 28px 28px 8px; scroll-behavior: smooth; }
  .turn { max-width: 780px; margin: 0 auto 30px; }
  .q { font-size: 16px; font-weight: 600; letter-spacing: -0.015em; margin-bottom: 10px; }
  .a { white-space: pre-wrap; word-break: break-word; letter-spacing: -0.003em; color: var(--fg); }
  .trace { color: var(--fg-3); font-size: 12.5px; margin: 3px 0; display: flex; align-items: center; gap: 6px; }
  .trace svg { width: 13px; height: 13px; opacity: .7; }
  .trace code { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12px; }
  .cites { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 7px; }
  .cite {
    font: 12px "SF Mono", ui-monospace, Menlo, monospace; background: var(--fill); color: var(--fg-2);
    padding: 4px 10px; border-radius: 999px; cursor: pointer; border: 0.5px solid var(--line);
    transition: transform 120ms cubic-bezier(.2,.7,.3,1), color 140ms ease, border-color 140ms ease;
  }
  .cite:hover { color: var(--fg); border-color: var(--fg-3); }
  .cite:active { transform: scale(.96); }
  .fb-open { margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; color: var(--fg-2); font-size: 13.5px; cursor: pointer; }
  .fb-open:hover { color: var(--fg); }
  .fb-open svg { width: 15px; height: 15px; }
  .fb { margin-top: 12px; border: 0.5px solid var(--line); border-radius: var(--radius); padding: 14px; background: var(--surface); max-width: 560px; }
  .fb input, .fb textarea {
    width: 100%; background: var(--surface-2); border: 0.5px solid var(--line); border-radius: 10px;
    padding: 9px 11px; color: var(--fg); font: inherit; font-size: 14px; margin-bottom: 9px; outline: none;
    transition: border-color 140ms ease;
  }
  .fb input:focus, .fb textarea:focus { border-color: var(--focus); }
  .fb textarea { resize: vertical; min-height: 56px; }
  .fb .row { display: flex; gap: 9px; }
  .fb .actions { display: flex; gap: 10px; align-items: center; }
  .fb .msg { font-size: 13px; color: var(--fg-3); }
  .fb .msg.err { color: var(--danger); }
  .fb .done { color: var(--fg-2); font-size: 13.5px; }
  .thinking { color: var(--fg-3); }
  .thinking.err { color: var(--danger); }
  .qimg { max-height: 200px; border-radius: 12px; border: 0.5px solid var(--line); margin: 8px 0; display: block; }
  .hint { color: var(--fg-3); max-width: 780px; margin: 0 auto; font-size: 14px; }
  .hint code { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 12.5px; background: var(--fill); padding: 1px 6px; border-radius: 6px; }

  /* 输入栏（半透明浮层） */
  #bar {
    flex-shrink: 0; padding: 12px 28px 16px;
    background: color-mix(in srgb, var(--surface) 72%, transparent);
    backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-top: 0.5px solid var(--line-soft);
  }
  #imgprev { max-width: 780px; margin: 0 auto 10px; }
  .imgchip { position: relative; display: inline-block; }
  .imgchip img { height: 56px; border-radius: 10px; border: 0.5px solid var(--line); display: block; }
  .imgchip .x { position: absolute; top: -7px; right: -7px; background: var(--fg); color: var(--bg); border-radius: 999px; width: 20px; height: 20px; display: grid; place-items: center; cursor: pointer; }
  .imgchip .x svg { width: 11px; height: 11px; }
  #bar form { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    display: grid; place-items: center; width: 44px; height: 44px; flex-shrink: 0;
    background: var(--fill); color: var(--fg-2); border: none; border-radius: 12px; cursor: pointer;
    transition: transform 120ms cubic-bezier(.2,.7,.3,1), color 140ms ease, background 140ms ease;
  }
  .icon-btn:hover { color: var(--fg); }
  .icon-btn:active { transform: scale(.94); }
  #in {
    flex: 1; background: var(--surface); border: 0.5px solid var(--line); border-radius: 12px;
    padding: 12px 15px; color: var(--fg); font: inherit; font-size: 15px; outline: none;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  #in:focus { border-color: var(--focus); box-shadow: 0 0 0 3.5px color-mix(in srgb, var(--focus) 22%, transparent); }
  #send {
    height: 44px; padding: 0 20px; background: var(--btn); color: var(--btn-fg); border: none; border-radius: 12px;
    font: inherit; font-size: 15px; font-weight: 590; letter-spacing: -0.01em; cursor: pointer;
    transition: transform 120ms cubic-bezier(.2,.7,.3,1), opacity 160ms ease;
  }
  #send:active { transform: scale(.96); }
  body.busy #in, body.busy #send, body.busy .icon-btn { opacity: .5; pointer-events: none; }

  /* 仪表盘：材质化 sheet（模糊 + 缩放入场 + 压暗背景） */
  #dash { position: fixed; inset: 0; z-index: 60; display: none; }
  #dash.show { display: block; }
  #scrim { position: absolute; inset: 0; background: color-mix(in srgb, #000 32%, transparent); opacity: 0; transition: opacity 300ms ease; }
  #dash.show #scrim { opacity: 1; }
  #dashbox {
    position: absolute; left: 50%; top: 6vh; transform: translateX(-50%) scale(.96); opacity: 0;
    width: min(880px, 92vw); max-height: 88vh; overflow-y: auto;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: saturate(180%) blur(30px); -webkit-backdrop-filter: saturate(180%) blur(30px);
    border: 0.5px solid var(--line); border-radius: var(--radius-lg); padding: 26px 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,.28);
    transition: transform 340ms cubic-bezier(.2,.8,.2,1), opacity 260ms ease;
  }
  #dash.show #dashbox { transform: translateX(-50%) scale(1); opacity: 1; }
  #dashbox .top { display: flex; align-items: flex-start; justify-content: space-between; }
  #dashbox h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  #dashbox .top .sub { color: var(--fg-3); font-size: 13px; margin-top: 3px; }
  #dashclose { display: grid; place-items: center; width: 30px; height: 30px; background: var(--fill); color: var(--fg-2); border: none; border-radius: 999px; cursor: pointer; transition: transform 120ms ease; }
  #dashclose:active { transform: scale(.9); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 12px; margin: 20px 0; }
  .card { background: var(--surface-2); border: 0.5px solid var(--line-soft); border-radius: var(--radius); padding: 16px; }
  .card .v { font-size: 27px; font-weight: 600; letter-spacing: -0.03em; }
  .card .k { color: var(--fg-3); font-size: 12.5px; margin-top: 3px; }
  .sec { margin-top: 22px; }
  .sec h3 { font-size: 12px; color: var(--fg-3); margin-bottom: 10px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
  .barrow { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; font-size: 13.5px; }
  .barrow .lbl { width: 92px; flex-shrink: 0; color: var(--fg-2); }
  .barrow .track { flex: 1; background: var(--fill); border-radius: 999px; height: 8px; overflow: hidden; }
  .barrow .fill { height: 100%; background: var(--fg-2); border-radius: 999px; }
  .barrow .n { width: 46px; text-align: right; color: var(--fg-2); font-variant-numeric: tabular-nums; }
  .days { display: flex; align-items: flex-end; gap: 4px; height: 72px; }
  .days .d { flex: 1; background: var(--fg-2); border-radius: 4px 4px 0 0; min-height: 3px; opacity: .85; }
  .hist { font-size: 12.5px; }
  .hist .h { display: flex; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid var(--line-soft); color: var(--fg-3); }
  .hist .h b { color: var(--fg); font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist .h .tnum { font-variant-numeric: tabular-nums; }

  /* 登录界面（未登录时的全屏遮罩） */
  #login { position: fixed; inset: 0; z-index: 80; display: none; align-items: center; justify-content: center; background: var(--bg); }
  #login.show { display: flex; }
  #login .box { width: min(360px, 88vw); background: var(--surface); border: 0.5px solid var(--line); border-radius: var(--radius-lg); padding: 28px 26px; box-shadow: 0 30px 80px rgba(0,0,0,.18); }
  #login h1 { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  #login .sub { color: var(--fg-3); font-size: 13px; margin-bottom: 18px; }
  #login input { width: 100%; background: var(--surface-2); border: 0.5px solid var(--line); border-radius: 10px; padding: 10px 12px; color: var(--fg); font: inherit; font-size: 14px; margin-bottom: 10px; outline: none; transition: border-color 140ms ease; }
  #login input:focus { border-color: var(--focus); }
  #login button { width: 100%; height: 42px; background: var(--btn); color: var(--btn-fg); border: none; border-radius: 10px; font: inherit; font-size: 14.5px; font-weight: 590; cursor: pointer; margin-top: 4px; }
  #login button:active { transform: scale(.98); }
  #loginerr { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 1em; }
  #login .whoami { color: var(--fg-2); font-size: 13px; margin-bottom: 14px; }
  #login .whoami a { color: var(--focus); text-decoration: none; margin-left: 8px; cursor: pointer; }

  #docsbtn { display: none; }

  @media (max-width: 720px) {
    #docsbtn { display: inline-flex; }
    header { padding: 10px 12px; gap: 8px; }
    header .sub { display: none; }
    header .brand { font-size: 15px; }
    header .ghost { padding: 0 10px; height: 30px; font-size: 12.5px; white-space: nowrap; }
    #docs {
      position: fixed; inset: 0 auto 0 0; z-index: 56; width: min(300px, 84vw);
      transform: translateX(-100%); transition: transform 280ms cubic-bezier(.2,.8,.2,1);
      box-shadow: 0 0 40px rgba(0,0,0,.3);
    }
    #docs.show { transform: translateX(0); }
    #docs-scrim { position: fixed; inset: 0; z-index: 54; background: color-mix(in srgb, #000 32%, transparent); opacity: 0; pointer-events: none; transition: opacity 280ms ease; }
    #docs-scrim.show { opacity: 1; pointer-events: auto; }
    #log { padding: 20px 14px 8px; }
    #bar { padding: 10px 14px 14px; }
  }
  @media (min-width: 721px) and (max-width: 1024px) {
    #docs { width: 240px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 1ms !important; scroll-behavior: auto !important; }
    #dashbox { transform: translateX(-50%) scale(1) !important; }
  }
  @media (prefers-reduced-transparency: reduce) {
    header, #bar, #dashbox { backdrop-filter: none; -webkit-backdrop-filter: none; background: var(--surface); }
  }
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <h1>ragkernel</h1>
    <div class="sub">企业知识库 · 登录后可提问</div>
    <form id="loginstep-user">
      <input id="loginuser" autocomplete="username" placeholder="用户名" required>
      <button type="submit">继续</button>
    </form>
    <form id="loginstep-pass" hidden>
      <div class="whoami">账号：<b id="whoami-pass"></b><a href="#" id="backfrompass">换一个</a></div>
      <input id="loginpass" type="password" autocomplete="current-password" placeholder="密码" required>
      <button type="submit">登录</button>
    </form>
    <form id="loginstep-setup" hidden>
      <div class="whoami">账号：<b id="whoami-setup"></b><a href="#" id="backfromsetup">换一个</a></div>
      <div class="sub">首次登录，请输入管理员给你的建号口令并设置密码</div>
      <input id="setupcode" autocomplete="off" placeholder="建号口令" required>
      <input id="setuppass" type="password" autocomplete="new-password" placeholder="设置密码（至少 6 位）" required>
      <button type="submit">设置密码并登录</button>
    </form>
    <div id="loginerr"></div>
  </div>
</div>
<header>
  <button class="ghost tap" id="docsbtn" title="文档"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  <span class="brand">ragkernel</span><span class="sub">企业知识库 · 本地检索 · 带引用问答</span>
  <span class="spacer"></span>
  <button class="ghost" id="dashbtn"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16"/><path d="M7 19v-5"/><path d="M12 19v-9"/><path d="M17 19v-7"/></svg>仪表盘</button>
  <button class="ghost" id="logoutbtn">退出</button>
</header>
<div id="main">
  <div id="docs-scrim"></div>
  <aside id="docs">
    <div class="hd"><span>文档</span><span class="sub" id="doccount"></span></div>
    <div id="drop">拖拽文件到此，或点击选择<br><span class="sub">PDF · Word · PPT · Markdown · CSV/Excel 工单，自动索引</span></div>
    <input type="file" id="file" hidden>
    <div id="upprog"></div>
    <div id="doclist"></div>
  </aside>
  <section id="chat">
    <div id="log"></div>
    <div id="bar">
      <div id="imgprev"></div>
      <form id="form" action="javascript:void 0">
        <label class="icon-btn tap" id="photobtn" title="拍照/上传故障照片（错误屏 / 铭牌）"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.8A1.8 1.8 0 0 1 5.8 7h1.6l.9-1.5A1 1 0 0 1 9.9 5h4.2a1 1 0 0 1 .86.5L15.6 7h1.6A1.8 1.8 0 0 1 19 8.8v7.4A1.8 1.8 0 0 1 17.2 18H5.8A1.8 1.8 0 0 1 4 16.2z"/><circle cx="12" cy="12.4" r="3"/></svg><input type="file" id="photo" accept="image/*" capture="environment" hidden></label>
        <input id="in" autocomplete="off" autofocus placeholder="向知识库提问……可附故障照片" spellcheck="false">
        <button id="send" type="submit">提问</button>
      </form>
    </div>
  </section>
</div>

<div id="dash">
  <div id="scrim"></div>
  <div id="dashbox">
    <div class="top">
      <div><h2>知识库仪表盘</h2><div class="sub">文件 · 片段 · 索引 · 提问 —— 均有记录</div></div>
      <button id="dashclose" title="关闭"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 7l10 10M17 7L7 17"/></svg></button>
    </div>
    <div id="dashbody"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const log = $('#log'), input = $('#in'), drop = $('#drop'), fileInput = $('#file');
let session = null, busy = false;
const esc = s => (s || '').toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const KIND = { upload: '上传', ticket_import: '工单导入', feedback: '反馈案例' };
const ICON = {
  trace: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6l6 6-6 6"/></svg>',
  pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L18.5 9.5a2 2 0 0 0-2.83-2.83L5 17z"/><path d="M13.5 7.5l3 3"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14"/><path d="M9 7V5.6A1.6 1.6 0 0 1 10.6 4h2.8A1.6 1.6 0 0 1 15 5.6V7"/><path d="M7 7l1 12a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-12"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M7 7l10 10M17 7L7 17"/></svg>',
};

function scrollDown() { log.scrollTop = log.scrollHeight; }

// ── 登录 / token（用户名 → 确认 → 按账号状态弹密码框或设密码框）───
let TOKEN = localStorage.getItem('rk_token') || '';
function setToken(t) { TOKEN = t; if (t) localStorage.setItem('rk_token', t); else localStorage.removeItem('rk_token'); }

const loginStepUser = $('#loginstep-user'), loginStepPass = $('#loginstep-pass'), loginStepSetup = $('#loginstep-setup');
function showLoginStep(step) {
  loginStepUser.hidden = step !== 'user';
  loginStepPass.hidden = step !== 'pass';
  loginStepSetup.hidden = step !== 'setup';
  $('#loginerr').textContent = '';
}
function showLogin(msg) {
  $('#login').classList.add('show');
  showLoginStep('user');
  $('#loginuser').value = '';
  if (msg) $('#loginerr').textContent = msg;
}
function hideLogin() { $('#login').classList.remove('show'); $('#loginerr').textContent = ''; }

async function apiFetch(path, opts = {}) {
  const headers = Object.assign({}, opts.headers, TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {});
  const r = await fetch(path, Object.assign({}, opts, { headers }));
  if (r.status === 401) { setToken(''); showLogin('登录已过期，请重新登录'); }
  return r;
}

loginStepUser.addEventListener('submit', async e => {
  e.preventDefault();
  const username = $('#loginuser').value.trim();
  if (!username) return;
  $('#loginerr').textContent = '';
  try {
    const r = await fetch('/api/auth/check-user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username }) });
    const j = await r.json();
    if (!r.ok) { $('#loginerr').textContent = j.error || '请求失败'; return; }
    if (!j.exists) { $('#loginerr').textContent = '账号不存在，请联系管理员建号'; return; }
    if (j.needs_setup) {
      $('#whoami-setup').textContent = username;
      $('#setupcode').value = ''; $('#setuppass').value = '';
      showLoginStep('setup');
      $('#setupcode').focus();
    } else {
      $('#whoami-pass').textContent = username;
      $('#loginpass').value = '';
      showLoginStep('pass');
      $('#loginpass').focus();
    }
  } catch (e) { $('#loginerr').textContent = '' + e; }
});

loginStepPass.addEventListener('submit', async e => {
  e.preventDefault();
  const username = $('#whoami-pass').textContent, password = $('#loginpass').value;
  $('#loginerr').textContent = '登录中…';
  try {
    const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const j = await r.json();
    if (!r.ok) { $('#loginerr').textContent = j.error || '登录失败'; return; }
    setToken(j.token);
    await boot();
  } catch (e) { $('#loginerr').textContent = '' + e; }
});

loginStepSetup.addEventListener('submit', async e => {
  e.preventDefault();
  const username = $('#whoami-setup').textContent, setup_code = $('#setupcode').value.trim(), password = $('#setuppass').value;
  if (password.length < 6) { $('#loginerr').textContent = '密码至少 6 位'; return; }
  $('#loginerr').textContent = '设置中…';
  try {
    const r = await fetch('/api/auth/setup-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, setup_code, password }) });
    const j = await r.json();
    if (!r.ok) { $('#loginerr').textContent = j.error || '设置失败'; return; }
    setToken(j.token);
    await boot();
  } catch (e) { $('#loginerr').textContent = '' + e; }
});

$('#backfrompass').onclick = e => { e.preventDefault(); showLoginStep('user'); };
$('#backfromsetup').onclick = e => { e.preventDefault(); showLoginStep('user'); };

$('#logoutbtn').onclick = async () => {
  try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch (e) {}
  setToken('');
  log.innerHTML = '';
  showLogin();
};

// ── 文档抽屉（窄屏） ──────────────────────────────────────────
const docsPanel = $('#docs'), docsScrim = $('#docs-scrim');
function openDocs() { docsPanel.classList.add('show'); docsScrim.classList.add('show'); }
function closeDocs() { docsPanel.classList.remove('show'); docsScrim.classList.remove('show'); }
$('#docsbtn').onclick = openDocs;
docsScrim.onclick = closeDocs;

async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader(), dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let i;
    while ((i = buf.indexOf('\n\n')) >= 0) {
      const line = buf.slice(0, i); buf = buf.slice(i + 2);
      if (line.startsWith('data: ')) onEvent(JSON.parse(line.slice(6)));
    }
  }
}

function fp() {
  const b = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height].join('|');
  let h = 5381; for (let i = 0; i < b.length; i++) h = ((h << 5) + h + b.charCodeAt(i)) >>> 0;
  return h.toString(16).padStart(8, '0');
}

async function boot() {
  if (!TOKEN) { showLogin(); return; }
  const r = await apiFetch('/api/session', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fingerprint: fp() }) });
  if (!r.ok) { showLogin('会话建立失败，请重新登录'); return; }
  session = await r.json();
  hideLogin();
  await loadDocs();
  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.innerHTML = '上传手册或工单后即可提问。答案只依据文档内容，并附 <code>[D&lt;文档&gt;#&lt;块&gt; p.&lt;页&gt; · 分类]</code> 引用；查不到会如实说明。答完可记录处理结果，回填知识库。';
  log.appendChild(hint);
}

async function loadDocs() {
  const r = await apiFetch('/api/documents');
  const j = await r.json();
  const list = $('#doclist'); list.innerHTML = '';
  $('#doccount').textContent = j.documents.length ? j.documents.length + ' 篇' : '';
  for (const d of j.documents) {
    const el = document.createElement('div');
    el.className = 'doc'; el.dataset.id = d.id;
    const kind = d.source_kind && d.source_kind !== 'upload' ? `<span class="kind">${KIND[d.source_kind] || d.source_kind}</span>` : '';
    el.innerHTML = `<div class="body">
        <div class="name">D${d.id} · ${esc(d.filename)}${kind}</div>
        <div class="meta">${d.chunks} 片${d.page_count ? ' · ' + d.page_count + ' 页' : ''} · <span class="st-${d.status}">${d.status}</span></div>
      </div><div class="del tap" title="删除">${ICON.trash}</div>`;
    el.querySelector('.del').onclick = () => deleteDoc(d.id);
    list.appendChild(el);
  }
}

async function deleteDoc(id) { await apiFetch('/api/documents/' + id, { method: 'DELETE' }); loadDocs(); }

function highlightDoc(id) {
  document.querySelectorAll('.doc').forEach(e => e.classList.toggle('hl', e.dataset.id == id));
  const el = document.querySelector(`.doc[data-id="${id}"]`);
  if (el) el.scrollIntoView({ block: 'nearest' });
}

async function uploadFile(file) {
  const prog = $('#upprog');
  const fd = new FormData(); fd.append('file', file);
  prog.textContent = '上传中 ' + file.name + ' …';
  try {
    const r = await apiFetch('/api/upload', { method: 'POST', body: fd });
    if (!r.ok) { const j = await r.json().catch(() => ({})); prog.textContent = '未成功 · ' + (j.error || r.status); return; }
    await readSSE(r, ev => {
      if (ev.t === 'stage') {
        const label = { received: '已接收', loading: '解析中', chunking: '分片中', embedding: '向量化（模型预热可能稍慢）', chunked: '分片完成', done: '已索引', skip: '已索引过（跳过）' }[ev.stage] || ev.stage;
        prog.textContent = label + (ev.chunks ? ' · ' + ev.chunks + ' 片' : '');
        if (ev.stage === 'done' || ev.stage === 'skip') { loadDocs(); setTimeout(() => prog.textContent = '', 2500); }
      } else if (ev.t === 'error') { prog.textContent = '未成功 · ' + ev.message; }
    });
  } catch (e) { prog.textContent = '未成功 · ' + e; }
}

drop.onclick = () => fileInput.click();
fileInput.onchange = () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); fileInput.value = ''; };
['dragover', 'dragenter'].forEach(t => drop.addEventListener(t, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave', 'drop'].forEach(t => drop.addEventListener(t, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) uploadFile(f); });

function addFeedback(turn, question) {
  const open = document.createElement('span');
  open.className = 'fb-open tap'; open.innerHTML = ICON.pencil + '<span>记录处理结果</span>';
  turn.appendChild(open);
  open.onclick = () => {
    open.remove();
    const fb = document.createElement('div'); fb.className = 'fb';
    fb.innerHTML = `
      <div class="row"><input class="eq" placeholder="设备 / 型号（选填）"><input class="rs" placeholder="结果（选填）"></div>
      <input class="qq" placeholder="故障现象 / 问题" value="${esc(question)}">
      <textarea class="rz" placeholder="实际处理 / 解决办法（必填）"></textarea>
      <div class="actions"><button class="ghost sub" style="height:34px">入库</button><span class="msg"></span></div>`;
    turn.appendChild(fb);
    fb.querySelector('.rz').focus();
    fb.querySelector('.sub').onclick = async () => {
      const resolution = fb.querySelector('.rz').value.trim();
      const msg = fb.querySelector('.msg');
      if (!resolution) { msg.className = 'msg err'; msg.textContent = '请填写实际处理'; return; }
      msg.className = 'msg'; msg.textContent = '入库中…';
      const r = await apiFetch('/api/feedback', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: fb.querySelector('.qq').value, resolution, equipment: fb.querySelector('.eq').value, result: fb.querySelector('.rs').value }) });
      const j = await r.json();
      if (r.ok) { fb.innerHTML = `<span class="done">已入库为 D${j.document_id}「${esc(j.category)}」，下次同类问题会用上。</span>`; loadDocs(); }
      else { msg.className = 'msg err'; msg.textContent = j.error || r.status; }
    };
  };
}

async function ask(q, image) {
  busy = true; document.body.classList.add('busy');
  const turn = document.createElement('div'); turn.className = 'turn';
  turn.innerHTML = `<div class="q">${esc(q) || '照片提问'}</div>` + (image ? `<img class="qimg" src="${image}">` : '') + `<div class="thinking">思考中…</div>`;
  log.appendChild(turn); scrollDown();
  const thinking = turn.querySelector('.thinking');
  try {
    const r = await apiFetch('/api/ask', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: session.session_id, question: q, image: image || undefined }) });
    if (!r.ok) { const j = await r.json().catch(() => ({})); thinking.className = 'thinking err'; thinking.textContent = j.error || r.status; return; }
    await readSSE(r, ev => {
      if (ev.t === 'tool') {
        const arg = ev.input && (ev.input.query || ev.input.document_id || ev.input.category || '');
        const t = document.createElement('div'); t.className = 'trace';
        t.innerHTML = ICON.trace + `<span>${ev.name}</span>` + (arg ? `<code>${esc(JSON.stringify(arg))}</code>` : '');
        turn.insertBefore(t, thinking);
      } else if (ev.t === 'answer') {
        thinking.remove();
        const a = document.createElement('div'); a.className = 'a'; a.textContent = ev.text; turn.appendChild(a);
      } else if (ev.t === 'done') {
        if (ev.citations && ev.citations.length) {
          const box = document.createElement('div'); box.className = 'cites';
          for (const c of ev.citations) {
            const chip = document.createElement('span'); chip.className = 'cite tap';
            chip.textContent = `[${c.ref}${c.page ? ' p.' + c.page : ''}${c.category ? ' · ' + c.category : ''}] ${c.filename}`;
            chip.onclick = () => highlightDoc(c.document_id);
            box.appendChild(chip);
          }
          turn.appendChild(box);
        }
        addFeedback(turn, q);
      } else if (ev.t === 'error') { thinking.className = 'thinking err'; thinking.textContent = ev.message; }
      scrollDown();
    });
  } catch (e) { thinking.className = 'thinking err'; thinking.textContent = '' + e; }
  finally { busy = false; document.body.classList.remove('busy'); input.focus(); }
}

// 照片附件（客户端降采样）
let pendingImage = null;
const photo = $('#photo'), imgprev = $('#imgprev');
photo.onchange = () => { const f = photo.files[0]; if (f) loadPhoto(f); photo.value = ''; };
function clearPhoto() { pendingImage = null; imgprev.innerHTML = ''; }
function loadPhoto(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max = 1024; let w = img.width, h = img.height;
      if (w > max || h > max) { const s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      pendingImage = c.toDataURL('image/jpeg', 0.8);
      const chip = document.createElement('span'); chip.className = 'imgchip';
      chip.innerHTML = `<img src="${pendingImage}"><span class="x tap">${ICON.close}</span>`;
      chip.querySelector('.x').onclick = clearPhoto;
      imgprev.innerHTML = ''; imgprev.appendChild(chip);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

$('#form').addEventListener('submit', e => {
  e.preventDefault();
  if (busy) return;
  const v = input.value.trim();
  if (!v && !pendingImage) return;
  input.value = '';
  const img = pendingImage; clearPhoto();
  ask(v, img);
});

// 仪表盘
function bars(items, labelKey, nKey) {
  const max = Math.max(1, ...items.map(x => x[nKey]));
  return items.map(x => `<div class="barrow"><span class="lbl">${esc(x[labelKey])}</span>
    <span class="track"><span class="fill" style="width:${Math.round(x[nKey] / max * 100)}%"></span></span>
    <span class="n">${x[nKey]}</span></div>`).join('');
}
function renderDash(j) {
  const t = j.totals, q = j.queries;
  const cards = [['文档', t.documents], ['片段', t.chunks_total], ['已索引', t.embedded],
    ['字符数', t.chars_total], ['提问数', q.total], ['会话数', q.sessions]];
  const bySrc = Object.entries(t.by_source_kind || {}).map(([k, n]) => ({ k: KIND[k] || k, n }));
  const days = q.by_day || [];
  const dmax = Math.max(1, ...days.map(d => d.n));
  $('#dashbody').innerHTML = `
    <div class="cards">${cards.map(c => `<div class="card"><div class="v">${c[1]}</div><div class="k">${c[0]}</div></div>`).join('')}</div>
    ${bySrc.length ? `<div class="sec"><h3>来源构成（含反馈回填）</h3>${bars(bySrc, 'k', 'n')}</div>` : ''}
    ${j.categories.length ? `<div class="sec"><h3>分类分布</h3>${bars(j.categories, 'category', 'n')}</div>` : ''}
    <div class="sec"><h3>近 14 天提问量</h3><div class="days">${days.map(d => `<div class="d" style="height:${Math.round(d.n / dmax * 100)}%" title="${d.d}: ${d.n}"></div>`).join('') || '<span class="sub" style="color:var(--fg-3)">暂无</span>'}</div></div>
    <div class="sec"><h3>摄取历史</h3><div class="hist">${(j.ingestion || []).slice(0, 20).map(h =>
      `<div class="h"><b>${esc(h.filename)}</b><span>${h.action}</span><span class="tnum">${h.chunks || 0} 片</span><span class="tnum">${h.ms || 0} ms</span><span class="tnum">${new Date(h.ts * 1000).toLocaleString()}</span></div>`).join('') || '<span style="color:var(--fg-3)">暂无</span>'}</div></div>`;
}
async function openDash() {
  const r = await apiFetch('/api/stats'); const j = await r.json();
  renderDash(j); $('#dash').classList.add('show');
}
function closeDash() { $('#dash').classList.remove('show'); }
$('#dashbtn').onclick = openDash;
$('#dashclose').onclick = closeDash;
$('#scrim').onclick = closeDash;
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeDash(); closeDocs(); } });

boot();
</script>

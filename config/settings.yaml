# ragkernel 配置（无个人路径/tier；单租户 MVP）

data_dir: data

# LLM provider —— provider 无关。kind=anthropic（Claude/MiniMax）| openai（vLLM/Ollama/本地）。
# 默认 MiniMax（零成本，开箱即用）。
#   Claude:      kind: anthropic, base_url: "", model: claude-sonnet-5, api_key_env: ANTHROPIC_API_KEY
#   本地 vLLM:   kind: openai, base_url: http://localhost:8000/v1, model: Qwen3-32B-AWQ, api_key_env: VLLM_API_KEY
#                （私有化：本地引擎几乎都是 OpenAI 兼容；embedding+重排本来就全本地）
provider:
  kind: anthropic
  base_url: "https://api.minimaxi.com/anthropic"
  model: "MiniMax-M3"
  api_key_env: MINIMAX_API_KEY
  max_tokens: 8000

embed:
  model: BAAI/bge-m3

retrieval:
  rerank:
    enabled: true
    model: BAAI/bge-reranker-v2-m3
    candidates: 40
  restore_window: 4    # 命中 chunk 后，前后各补多少个同文档 chunk 还原上下文

chunking:
  # 元素级拆片：表格一行一片(表头前置)、工序整片、键值逐条、正文按标题+大小切。
  # min/max 只作用于正文(prose)；表格/工序/键值按自然单元，不受此约束。
  min_chars: 200
  max_chars: 3000

# 可插拔垂直层：equipment = 设备维修/售后故障库（拆片段+分类+标源）；none = 通用无分类。
vertical: equipment

# 分类：默认纯规则（离线、零成本）；llm=true 时对"其他"片段做一次 LLM 精分（复用 provider）。
classify:
  llm: false

web:
  host: 127.0.0.1
  port: 8360

upload:
  max_file_mb: 50
  allowed_ext: [.pdf, .docx, .pptx, .html, .htm, .md, .markdown, .txt, .csv, .xlsx, .step, .stp, .stl]

# 原生 CAD 摄取上限（超限则中止并保留 rejected 记录，不静默截断）。见 cad/limits.py DEFAULTS。
cad:
  max_file_mb: 250
  max_triangles: 5000000
  max_entities: 10000
  max_assembly_depth: 64
  max_seconds: 120
  ext_ref_depth: 0
  max_stl_component_chunks: 16
  face_component_max_triangles: 200000

ratelimit:
  ask_per_min: 30
  session_per_min: 20
  upload_per_min: 20
  max_question_chars: 2000

auth:
  token_ttl_days: 30
  setup_code_ttl_days: 7   # 待激活账号的一次性建号口令有效期

# 后台管理页面（/admin）IP 白名单；127.0.0.1/::1 本机回环地址始终放行，不用列在这里。
admin:
  allowed_ips: []

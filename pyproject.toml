[project]
name = "ragkernel"
version = "0.1.0"
description = "本地优先的企业 RAG 内核：混合检索 + 重排 + 带引用问答，傻瓜式自动索引"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40",
    "sentence-transformers>=3.0",
    "sqlite-vec>=0.1.6",
    "jieba>=0.42",
    "pyyaml>=6.0",
    "flask>=3.0",
    "pydantic>=2.0",
    "pypdf>=4.0",
    "python-docx>=1.1",
    "watchdog>=4.0",
]

[project.scripts]
ragkernel = "ragkernel.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ragkernel"]
